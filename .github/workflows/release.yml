name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: net-config-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: net-config-linux-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: net-config-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: net-config-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: net-config-windows-amd64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            name: net-config-windows-arm64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-zigbuild
        uses: shaogme/speedy-cargo-zigbuild@main

      - name: Install Zig
        uses: mlugg/setup-zig@main

      - name: Build with cargo (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build with cargo zigbuild (Unix)
        if: matrix.os != 'windows-latest'
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Prepare Assets
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/net-config.exe dist/${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/net-config dist/${{ matrix.name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@main
        with:
          path: out
          merge-multiple: true

      - name: Delete old release (if exists)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete ${{ github.event.inputs.version }} --cleanup-tag -y || true

      - name: Create new release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: out/*
          target_commitish: ${{ github.sha }}
          prerelease: false
          make_latest: true
